<!DOCTYPE html>
<html><head><meta charset="utf-8">
<style>html,body{margin:0;padding:0;background:transparent;}</style></head>
<body>
<svg width="512" height="512" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#25f4ee"/>
      <stop offset="0.5" stop-color="#9a6bff"/>
      <stop offset="1" stop-color="#fe2c55"/>
    </linearGradient>
    <radialGradient id="gloss" cx="0.32" cy="0.18" r="0.7">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.30"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="sh" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- thân icon -->
  <rect x="8" y="8" width="240" height="240" rx="60" fill="url(#bg)"/>
  <rect x="8" y="8" width="240" height="240" rx="60" fill="url(#gloss)"/>

  <!-- giỏ hàng -->
  <g filter="url(#sh)">
    <g fill="none" stroke="#ffffff" stroke-width="14" stroke-linecap="round" stroke-linejoin="round">
      <path d="M64 80 H86 L103 160 H178 L192 106 H97"/>
    </g>
    <circle cx="109" cy="184" r="13.5" fill="#ffffff"/>
    <circle cx="174" cy="184" r="13.5" fill="#ffffff"/>
    <!-- sparkle -->
    <path d="M190 66 l6.5 17 17 6.5 -17 6.5 -6.5 17 -6.5 -17 -17 -6.5 17 -6.5 z" fill="#ffffff"/>
  </g>
</svg>
</body></html>
