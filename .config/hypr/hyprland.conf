# ============================================================
#  Hyprland config — tạo bởi Claude cho michael
#  Phím chính (MOD) = SUPER (phím Windows)
# ============================================================

# ---------- MÀN HÌNH ----------
# Màn laptop 2880x1800 @120Hz, phóng to 1.6 lần (đổi 1.6 -> 1.5/1.75/2.0 nếu muốn to/nhỏ hơn)
monitor = eDP-1, 2880x1800@120, 0x0, 1.6
# Màn hình ngoài (HDMI/DP) nếu cắm thêm: tự nhận, scale 1
monitor = , preferred, auto, 1

# ============================================================
#  BIẾN MÔI TRƯỜNG
# ============================================================
# --- Gõ tiếng Việt (ibus + Unikey) ---
env = GTK_IM_MODULE, ibus
env = QT_IM_MODULE, ibus
env = XMODIFIERS, @im=ibus

# --- Fix màn hình trắng/đen cho app Tauri/WebKitGTK (meologin) ---
env = WEBKIT_DISABLE_DMABUF_RENDERER, 1

# --- AMD GPU + Wayland ---
env = XCURSOR_SIZE, 24
env = QT_QPA_PLATFORM, wayland;xcb
env = MOZ_ENABLE_WAYLAND, 1

# ============================================================
#  KHỞI ĐỘNG CÙNG HYPRLAND (autostart)
# ============================================================
# Bộ gõ tiếng Việt: script tự khởi động ibus (nếu cần) + GIỮ Unikey ổn định
exec-once = /home/michael/.config/hypr/start-vietnamese.sh
exec-once = waybar                          # thanh trạng thái trên cùng
exec-once = swaync                          # popup thông báo + trung tâm điều khiển
exec-once = nm-applet --indicator          # icon wifi/mạng dưới khay
exec-once = blueman-applet                  # icon Bluetooth ở thanh bar
exec-once = swaybg -i /home/michael/Pictures/wallpapers/catppuccin-waves.png -m fill   # hình nền mặc định (đổi bằng ⊞+W/azote)
exec-once = systemctl --user start hyprpolkitagent  # hộp thoại xác thực (mật khẩu)
exec-once = wl-paste --type text --watch cliphist store    # lưu lịch sử clipboard (chữ)
exec-once = wl-paste --type image --watch cliphist store   # lưu lịch sử clipboard (ảnh)

# ============================================================
#  NHẬP LIỆU (bàn phím / chuột)
# ============================================================
input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll = true
        tap-to-click = true
    }
}

# ============================================================
#  GIAO DIỆN
# ============================================================
general {
    gaps_in = 5
    gaps_out = 12
    border_size = 2
    # Viền gradient Catppuccin: mauve -> blue -> teal
    col.active_border = rgba(cba6f7ee) rgba(89b4faee) rgba(94e2d5ee) 45deg
    col.inactive_border = rgba(45475aaa)
    layout = dwindle
    resize_on_border = true
}

decoration {
    rounding = 12
    active_opacity = 1.0
    inactive_opacity = 0.97
    blur {
        enabled = true
        size = 6
        passes = 3
        new_optimizations = true
        ignore_opacity = true
    }
    shadow {
        enabled = true
        range = 20
        render_power = 3
        color = rgba(11111baa)
    }
}

animations {
    enabled = true
    bezier = wind, 0.05, 0.9, 0.1, 1.05
    bezier = overshot, 0.13, 0.99, 0.29, 1.1
    bezier = smoothOut, 0.36, 0, 0.66, -0.56
    bezier = smoothIn, 0.25, 1, 0.5, 1
    animation = windows, 1, 5, overshot, slide
    animation = windowsOut, 1, 4, smoothOut, slide
    animation = windowsMove, 1, 4, wind, slide
    animation = border, 1, 8, default
    animation = borderangle, 1, 30, default, loop
    animation = fade, 1, 6, smoothIn
    animation = workspaces, 1, 5, wind
}

dwindle {
    pseudotile = true
    preserve_split = true
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}

# ============================================================
#  PHÍM TẮT  (MOD = SUPER / phím Windows)
# ============================================================
$mod = SUPER
$term = kitty
$menu = wofi --show drun

# --- Cơ bản ---
bind = $mod, Return, exec, $term          # mở terminal
bind = $mod, D, exec, $menu               # mở menu ứng dụng
bind = $mod, Q, killactive,               # đóng cửa sổ
bind = $mod, M, exit,                     # thoát Hyprland (về màn login)
bind = $mod, E, exec, nautilus            # mở trình quản lý file
bind = $mod, W, exec, azote               # mở bảng chọn HÌNH NỀN (tự chọn, có hình thu nhỏ)
bind = $mod SHIFT, V, togglefloating,     # cửa sổ nổi/ghim (đổi từ ⊞+V)
bind = $mod, V, exec, /home/michael/.config/hypr/clipboard-history.sh  # ⊞+V: LỊCH SỬ CLIPBOARD (giống Windows)
bind = $mod, F, fullscreen,               # toàn màn hình
bind = $mod, P, pseudo,
bind = $mod, J, togglesplit,
# (Đã bỏ khoá màn hình ⊞+L theo yêu cầu — không dùng tới)
# bind = $mod, L, exec, hyprlock

# --- Chuyển bộ gõ Việt <-> Anh ---
bind = $mod, Space, exec, /home/michael/.config/hypr/toggle-ibus.sh
bind = $mod SHIFT, Space, exec, /home/michael/.config/hypr/fix-vietnamese.sh  # CỨU HỘ: gõ tiếng Việt bị đơ thì bấm cái này

# --- Chụp màn hình ---
bind = , Print, exec, grimshot --notify copy area                    # chọn vùng -> copy vào clipboard
bind = $mod, Print, exec, grimshot --notify save area               # chọn vùng -> LƯU FILE (~/Pictures)
bind = SHIFT, Print, exec, grimshot --notify copy output            # toàn màn -> clipboard
bind = $mod SHIFT, Print, exec, grim -g "$(slurp)" - | swappy -f -  # chọn vùng -> VẼ CHÚ THÍCH rồi lưu
bind = $mod SHIFT, S, exec, grimshot --notify copy area             # GIỐNG WINDOWS (Win+Shift+S): chọn vùng -> clipboard

# --- Quay màn hình (nhấn lần nữa để DỪNG) ---
bind = $mod, R, exec, /home/michael/.config/hypr/screen-record.sh full          # quay cả màn (không tiếng)
bind = $mod SHIFT, R, exec, /home/michael/.config/hypr/screen-record.sh region  # quay vùng chọn
bind = $mod ALT, R, exec, /home/michael/.config/hypr/screen-record.sh full audio # quay cả màn + tiếng

# --- Menu nguồn (tắt máy / khởi động lại / khoá / đăng xuất / ngủ) ---
bind = $mod, Escape, exec, wlogout -b 5

# --- Trung tâm điều khiển / thông báo (swaync) ---
bind = $mod, N, exec, swaync-client -t -sw

# --- Cava: cột nhạc nhảy (mở terminal chạy cava) ---
bind = $mod, A, exec, kitty --title=Cava-Visualizer -e cava

# --- Di chuyển focus ---
bind = $mod, left, movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up, movefocus, u
bind = $mod, down, movefocus, d

# --- Workspace (màn hình ảo) 1-9 ---
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
# Chuyển cửa sổ sang workspace khác
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9

# --- Kéo/resize cửa sổ bằng chuột + MOD ---
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# --- Âm lượng / độ sáng (phím chức năng) ---
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous
