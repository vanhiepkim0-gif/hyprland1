# Màn khoá (hyprlock) — hiện khi nhấn ⊞+L
background {
    monitor =
    color = rgba(26, 27, 38, 1.0)
    blur_passes = 2
}

# Đồng hồ lớn
label {
    monitor =
    text = $TIME
    color = rgba(205, 214, 244, 1.0)
    font_size = 72
    font_family = JetBrains Mono
    position = 0, 130
    halign = center
    valign = center
}

# Ngày tháng
label {
    monitor =
    text = cmd[update:1000] echo "$(date '+%A, %d/%m/%Y')"
    color = rgba(166, 173, 200, 1.0)
    font_size = 20
    font_family = JetBrains Mono
    position = 0, 60
    halign = center
    valign = center
}

# Ô nhập mật khẩu
input-field {
    monitor =
    size = 300, 54
    outline_thickness = 2
    dots_size = 0.3
    dots_spacing = 0.3
    outer_color = rgba(137, 180, 250, 1.0)
    inner_color = rgba(49, 50, 68, 1.0)
    font_color = rgba(205, 214, 244, 1.0)
    placeholder_text = Nhập mật khẩu để mở khoá...
    fail_text = Sai mật khẩu! Thử lại.
    position = 0, -40
    halign = center
    valign = center
}
